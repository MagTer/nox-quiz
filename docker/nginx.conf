server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Base MIME map shipped with nginx (does NOT include .mjs).
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Critical fix: nginx's bundled mime.types has no mapping for .mjs, so an
    # ES module served as .mjs falls through to application/octet-stream and the
    # browser rejects it ("Failed to load module script"). A types{} block
    # REPLACES (does not merge with) the inherited mapping for the listed
    # extensions, so we must re-declare `js` alongside `mjs` here — otherwise
    # .js would regress to octet-stream.
    types {
        application/javascript js mjs;
    }

    # Security hardening (proportionate to a static file server).
    server_tokens off;
    add_header X-Content-Type-Options "nosniff" always;

    location / {
        try_files $uri $uri/ /index.html;
        # No autoindex — never list directory contents.
    }
}
