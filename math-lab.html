<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Math Lab</title>
  <style>
    /* -------------------------------------------------------
       CSS Custom Properties — all locked from CONTEXT.md
    ------------------------------------------------------- */
    :root {
      --bg:           #0a0a0a;
      --bg-card:      #141414;
      --text:         #e8e8e8;
      --text-muted:   #888888;
      --accent:       #00ff88;
      --danger:       #ff3333;
      --border:       #333333;
      --grain-opacity: 0.05;
    }

    /* -------------------------------------------------------
       Reset
    ------------------------------------------------------- */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* -------------------------------------------------------
       Body — dark grunge base
    ------------------------------------------------------- */
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Impact', 'Arial Black', Arial, sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* -------------------------------------------------------
       Grain texture overlay — SVG feTurbulence data URI
       baseFrequency 0.9, numOctaves 4: subtle noise at 5% opacity
    ------------------------------------------------------- */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
      opacity: var(--grain-opacity);
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
      background-size: 256px 256px;
    }

    /* -------------------------------------------------------
       HUD — always-visible header with glass depth
    ------------------------------------------------------- */
    #hud {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 10px 24px;
      background: rgba(10, 10, 10, 0.92);
      backdrop-filter: blur(4px);
      border-bottom: 1px solid var(--border);
      z-index: 1000;
    }

    /* -------------------------------------------------------
       Level badge — accented bordered pill
    ------------------------------------------------------- */
    #level-display {
      font-size: 0.9rem;
      font-weight: 900;
      color: var(--accent);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 4px 10px;
      border: 1px solid var(--accent);
      border-radius: 4px;
      white-space: nowrap;
    }

    /* -------------------------------------------------------
       XP bar — segmented blocks rendered by JS
    ------------------------------------------------------- */
    #xp-bar {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 0;
    }

    .xp-label {
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--text-muted);
      margin-right: 6px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .xp-segment {
      display: inline-block;
      width: 12px;
      height: 16px;
      margin: 0 2px;
      background: #333;
      border-radius: 2px;
    }

    .xp-segment.filled {
      background: var(--accent);
      box-shadow: 0 0 4px rgba(0, 255, 136, 0.6);
    }

    /* -------------------------------------------------------
       Game board — centered question card
    ------------------------------------------------------- */
    #game-board {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 80px 24px 40px;
    }

    /* -------------------------------------------------------
       Fieldset reset — remove browser default styles
    ------------------------------------------------------- */
    fieldset {
      border: none;
      margin: 0;
      padding: 0;
    }

    /* -------------------------------------------------------
       Question fieldset card — depth via box-shadow
    ------------------------------------------------------- */
    #question-fieldset {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 40px 32px;
      background: var(--bg-card);
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.03);
      width: 100%;
      max-width: 520px;
    }

    #question-legend {
      font-size: 0.75rem;
      color: var(--text-muted);
      font-family: Arial, sans-serif;
      font-weight: 400;
      padding: 0 8px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    /* -------------------------------------------------------
       Question text — large, bold, grunge typography
       Color is var(--text) (#e8e8e8) — NOT accent (#00ff88)
       WCAG AA: #e8e8e8 on #141414 ≈ 15:1 — well above 4.5:1
    ------------------------------------------------------- */
    #question-text {
      font-size: clamp(2.5rem, 8vw, 4rem);
      font-weight: 900;
      color: var(--text);
      margin-bottom: 32px;
      letter-spacing: -0.02em;
      text-align: center;
      line-height: 1.1;
    }

    /* -------------------------------------------------------
       Answer options — 2×2 grid
    ------------------------------------------------------- */
    #options-list {
      list-style: none;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    /* Visually-hidden radio buttons — labels are click targets */
    .option-item input[type="radio"] {
      position: absolute;
      opacity: 0;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
    }

    .option-item label {
      display: block;
      padding: 18px 16px;
      background: var(--bg);
      border: 2px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      font-size: 1.4rem;
      font-weight: 800;
      text-align: center;
      color: var(--text);
      transition: border-color 0.08s, background 0.08s, transform 0.08s;
      user-select: none;
    }

    /* Hover only when not disabled — prevents visual confusion during feedback */
    #options-list:not(.locked) .option-item:not(.disabled) label:hover {
      border-color: var(--accent);
      background: rgba(0, 255, 136, 0.05);
      transform: translateY(-1px);
    }

    /* Correct answer — green */
    .option-item.correct label {
      border-color: var(--accent);
      background: rgba(0, 255, 136, 0.12);
      color: var(--accent);
    }

    /* Wrong answer — red */
    .option-item.wrong label {
      border-color: var(--danger);
      background: rgba(255, 51, 51, 0.12);
      color: var(--danger);
    }

    /* Disabled — all options locked after answering */
    .option-item.disabled label {
      cursor: default;
      opacity: 0.7;
    }

    /* -------------------------------------------------------
       Level-up overlay — full-screen celebration flash
    ------------------------------------------------------- */
    #levelup-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 255, 136, 0.15);
      font-size: clamp(3rem, 10vw, 6rem);
      font-weight: 900;
      color: var(--accent);
      letter-spacing: 0.1em;
      text-shadow: 0 0 30px var(--accent);
      pointer-events: none;
      opacity: 0;
      z-index: 10000;
    }

    @keyframes levelUpFlash {
      0%   { opacity: 0; transform: scale(0.8); }
      15%  { opacity: 1; transform: scale(1.05); }
      70%  { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(1); }
    }

    #levelup-overlay.active {
      animation: levelUpFlash 0.8s ease-out forwards;
    }

    /* -------------------------------------------------------
       Screen visibility system — data-screen / data-panel
       All panels hidden by default; CSS shows the active one.
       No JavaScript display toggling outside renderScreen().
    ------------------------------------------------------- */
    [data-panel] {
      display: none;
    }

    main[data-screen="quiz"]          [data-panel="quiz"]          { display: block; }
    main[data-screen="dungeon-map"]   [data-panel="dungeon-map"]   { display: flex; }
    main[data-screen="combat"]        [data-panel="combat"]        { display: flex; }
    main[data-screen="loot"]          [data-panel="loot"]          { display: flex; }
    main[data-screen="floor-summary"] [data-panel="floor-summary"] { display: flex; }
    main[data-screen="dead"]          [data-panel="dead"]          { display: flex; }

    /* Dungeon placeholder panels — centered layout, full-height */
    [data-panel]:not([data-panel="quiz"]) {
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 80px 24px 40px;
      gap: 16px;
    }

    [data-panel] h2 {
      font-size: 2rem;
      font-weight: 900;
      color: var(--accent);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    [data-panel] p {
      font-size: 1rem;
      color: var(--text-muted);
      font-family: Arial, sans-serif;
    }

    /* -------------------------------------------------------
       HP Bars — container/fill pattern; JS drives width%
    ------------------------------------------------------- */
    .hp-bar-container {
      width: 100%;
      height: 12px;
      background: #222;
      border-radius: 6px;
      overflow: hidden;
    }

    .hp-bar {
      height: 100%;
      border-radius: 6px;
      transition: width 300ms ease;
      width: 100%;
    }

    .hp-bar--enemy  { background: #ff4444; }
    .hp-bar--player { background: var(--accent); }

    /* -------------------------------------------------------
       Combat enemy area — position:relative for damage float
    ------------------------------------------------------- */
    #combat-enemy-area {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      width: 100%;
      max-width: 320px;
    }

    /* Player HP container — position:relative for damage float */
    #player-hp-container {
      position: relative;
      width: 100%;
      max-width: 320px;
    }

    /* -------------------------------------------------------
       Floating damage numbers — CSS @keyframes animation
       Created dynamically by DungeonRenderer.showDamageNumber()
       Removed on animationend — no DOM leak
    ------------------------------------------------------- */
    .damage-number {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      font-size: 1.4rem;
      font-weight: 900;
      pointer-events: none;
      animation: floatUp 400ms ease-out forwards;
      font-family: 'Impact', 'Arial Black', Arial, sans-serif;
    }

    /* Green: damage dealt to enemy on correct answer */
    .damage-number--hit    { color: var(--accent); }

    /* Red: damage received by player on wrong answer */
    .damage-number--damage { color: var(--danger); }

    @keyframes floatUp {
      0%   { opacity: 1; transform: translateX(-50%) translateY(0); }
      100% { opacity: 0; transform: translateX(-50%) translateY(-40px); }
    }

    /* -------------------------------------------------------
       Enemy sprite — large emoji display
    ------------------------------------------------------- */
    #combat-enemy-sprite {
      font-size: clamp(4rem, 8vw, 6rem);
      line-height: 1;
      user-select: none;
    }

    /* -------------------------------------------------------
       Combat feedback text — RPG-style (accent color)
    ------------------------------------------------------- */
    #combat-feedback {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--accent);
      font-family: Arial, sans-serif;
      min-height: 1.5em;
      text-align: center;
    }

    /* -------------------------------------------------------
       Flavor text — enemy RPG flavor line (muted, italic)
    ------------------------------------------------------- */
    #combat-flavor {
      font-size: 0.9rem;
      font-style: italic;
      color: var(--text-muted);
      font-family: Arial, sans-serif;
      min-height: 1.3em;
      text-align: center;
    }

    /* -------------------------------------------------------
       Room indicator — small muted uppercase label
    ------------------------------------------------------- */
    #combat-room-indicator {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text-muted);
      font-family: Arial, sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    /* -------------------------------------------------------
       Combat fieldset reset — no border/margin/padding
    ------------------------------------------------------- */
    #combat-question-text {
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      font-weight: 900;
      font-family: 'Impact', 'Arial Black', Arial, sans-serif;
      color: var(--text);
      text-align: center;
      letter-spacing: 0.05em;
      margin: 0;
    }
    #combat-question {
      border: none;
      margin: 0;
      padding: 0;
      width: 100%;
      max-width: 520px;
    }

    /* -------------------------------------------------------
       Dungeon panel buttons — floor-summary, loot, dead
    ------------------------------------------------------- */
    [data-panel] button {
      margin-top: 16px;
      padding: 14px 32px;
      background: var(--accent);
      color: #0a0a0a;
      font-family: 'Impact', 'Arial Black', Arial, sans-serif;
      font-size: 1rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    /* -------------------------------------------------------
       Quiz HUD — Enter Dungeon button (grunge outline style)
    ------------------------------------------------------- */
    #enter-dungeon-btn {
      margin-top: 0.75rem;
      padding: 0.5rem 1.25rem;
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: 'Impact', 'Arial Black', Arial, sans-serif;
      font-size: 0.95rem;
      cursor: pointer;
      letter-spacing: 0.05em;
    }
    #enter-dungeon-btn:hover {
      background: var(--accent);
      color: #0a0a0a;
    }

    /* -------------------------------------------------------
       Dungeon map — Enter Combat button (grunge outline style)
    ------------------------------------------------------- */
    #enter-combat-btn {
      margin-top: 1rem;
      padding: 0.5rem 1.5rem;
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: 'Impact', 'Arial Black', Arial, sans-serif;
      font-size: 1rem;
      cursor: pointer;
      letter-spacing: 0.05em;
    }
    #enter-combat-btn:hover {
      background: var(--accent);
      color: #0a0a0a;
    }
  </style>
</head>
<body>

  <!-- HUD: always visible header with level badge and XP bar -->
  <header id="hud">
    <span id="level-display">Level 1</span>
    <div id="xp-bar"><span class="xp-label">XP</span><!-- Segments rendered by JS --></div>
  </header>

  <!-- Game board: centered question card -->
  <main id="game-board" data-screen="quiz">
    <section data-panel="quiz">
    <fieldset id="question-fieldset">
      <legend id="question-legend">Choose the correct answer</legend>
      <p id="question-text">Loading...</p>
      <ul id="options-list">
        <!-- Answer options rendered by JS -->
      </ul>
    </fieldset>
    <button id="enter-dungeon-btn">Enter Dungeon</button>
    </section>

    <section data-panel="dungeon-map">
      <h2 id="dungeon-map-floor">Floor 1</h2>
      <p id="dungeon-map-enemy"></p>
      <button id="enter-combat-btn">Enter Combat</button>
    </section>

    <section data-panel="combat">
      <!-- Floor/room indicator — DungeonRenderer writes "Floor N · Room M/5" -->
      <p id="combat-room-indicator"></p>

      <!-- Enemy area: sprite + enemy HP bar; position:relative set in CSS for damage number float -->
      <div id="combat-enemy-area">
        <div id="combat-enemy-sprite"></div>
        <div class="hp-bar-container" id="enemy-hp-container">
          <div class="hp-bar hp-bar--enemy" id="enemy-hp-fill"></div>
        </div>
      </div>

      <!-- Flavor text — DungeonRenderer writes enemy flavor line via textContent -->
      <p id="combat-flavor"></p>

      <!-- Feedback text — DungeonRenderer populates with RPG feedback text -->
      <p id="combat-feedback"></p>

      <!-- Player HP bar — outside enemy area; position:relative set in CSS -->
      <div class="hp-bar-container" id="player-hp-container">
        <div class="hp-bar hp-bar--player" id="player-hp-fill"></div>
      </div>

      <!-- Combat question text — the multiplication expression e.g. "6 × 7 = ?" -->
      <p id="combat-question-text"></p>

      <!-- Combat question fieldset — separate from v1 #question-fieldset; DungeonRenderer renders options dynamically -->
      <fieldset id="combat-question">
        <ul id="combat-options-list"></ul>
      </fieldset>
    </section>

    <section data-panel="loot">
      <h2>Loot Acquired</h2>
      <!-- DungeonRenderer writes item emoji and item name via textContent -->
      <p id="loot-emoji"></p>
      <p id="loot-name"></p>
      <!-- Phase 5 wires onclick; Phase 4 leaves unconnected (visual only) -->
      <button id="loot-continue">Continue</button>
    </section>

    <section data-panel="floor-summary">
      <!-- DungeonRenderer writes "Floor N Cleared!" into headline -->
      <h2 id="floor-summary-headline"></h2>
      <p id="floor-summary-enemies"></p>
      <p id="floor-summary-xp"></p>
      <p id="floor-summary-hp"></p>
      <!-- Phase 5 wires onclick; Phase 4 leaves unconnected (visual only) -->
      <button id="floor-summary-continue">Advance</button>
    </section>

    <section data-panel="dead">
      <h2>You Fell</h2>
      <p>The dungeon claims another soul.</p>
      <!-- Phase 5 wires onclick; Phase 4 leaves unconnected (visual only) -->
      <button id="dead-retry">Try Again</button>
    </section>
  </main>

  <!-- Level-up celebration overlay -->
  <div id="levelup-overlay" aria-live="polite"></div>

  <script>
    'use strict';

    /* ==========================================================
       MODULE 1: CONFIG
       All magic numbers in one place — locked values from CONTEXT.md
    ========================================================== */
    const CONFIG = {
      XP_EASY:           10,   // XP for correct answer on tables 1–5
      XP_HARD:           20,   // XP for correct answer on tables 6–9
      BASE_XP:           200,  // XP required for Level 1 → Level 2
      LEVEL_MULT:        1.3,  // per-level threshold multiplier
      ADVANCE_DELAY_MS:  1000, // delay before auto-advancing to next question (1s)
      SEGMENT_COUNT:     20,   // number of XP bar segments
      HARD_TABLES:       [6, 7, 8, 9],
      EASY_TABLES:       [1, 2, 3, 4, 5],
      SAVE_KEY:          'mathlab_save_v1', // localStorage key (locked in CONTEXT.md)
      ACCURACY_ALPHA:    0.15,  // EWMA weight for new answer
      MASTERY_THRESHOLD: 0.80,  // 80% accuracy over last 10 to reduce drilling
      STRUGGLE_THRESHOLD: 0.60, // below this → 1.5× weight boost
      STRUGGLE_BOOST:    1.5,
      MASTERY_WINDOW:    10     // sliding window size for mastery check
    };

    // Dungeon Crawler constants — Phase 2 addition
    CONFIG.DUNGEON = {
      PLAYER_HP:       100,              // starting HP for the player each run
      DAMAGE_CORRECT:  3,               // player deals this to enemy per correct answer
      DAMAGE_WRONG:    8,               // enemy deals this to player per wrong answer
      GOBLIN_HP:       9,               // Floor 1 enemy HP (3 correct answers to kill)
      SKELETON_HP:     15,              // Floor 2 enemy HP (5 correct answers to kill)
      DRAGON_HP:       21,              // Floor 3 enemy HP (7 correct answers to kill)
      GOBLIN_XP:       30,              // XP awarded on Goblin defeat
      SKELETON_XP:     50,              // XP awarded on Skeleton defeat
      DRAGON_XP:       80,              // XP awarded on Dragon defeat
      ROOMS_PER_FLOOR: 5,              // 1 entrance + 3 combat + 1 boss; used by Phase 5
      SAVE_KEY_V2:     'mathlab_save_v2', // new localStorage key for v2 save format
      BOSS_HP_MULT:    2,               // boss room enemy HP multiplier (floor enemy HP * 2)
      FINAL_BOSS_HP:   40,              // Floor 4 Final Boss base HP
      FINAL_BOSS_XP:   150,             // XP awarded on Final Boss defeat
      MAX_FLOORS:      4,               // total number of dungeon floors
      SWORD_BONUS:     1,               // extra damage to enemy per correct answer when sword held
      SHIELD_REDUCTION: 3,              // damage reduction per wrong answer when shield held
      POTION_HEAL:     25,              // HP restored instantly when potion picked up
      LOOT_DROP_RATE:  0.6              // probability that a regular enemy drops loot (60%)
    };

    /* ==========================================================
       MODULE 2: XpCalculator
       Pure XP math — level thresholds and per-table XP amounts
    ========================================================== */
    const XpCalculator = (() => {
      return {
        getLevelThreshold(level) {
          return Math.round(CONFIG.BASE_XP * Math.pow(CONFIG.LEVEL_MULT, level - 1));
        },
        calculateXp(table) {
          return CONFIG.HARD_TABLES.includes(table) ? CONFIG.XP_HARD : CONFIG.XP_EASY;
        }
      };
    })();

    /* ==========================================================
       MODULE 3: PlayerState
       Closure-based state: XP, level, accuracy EWMA, history window
    ========================================================== */
    const PlayerState = (() => {
      let xp = 0;
      let level = 1;
      // EWMA per table — hard tables start lower (higher initial weight in selector)
      const accuracy = { 1: 0.5, 2: 0.5, 3: 0.5, 4: 0.5, 5: 0.5,
                         6: 0.4, 7: 0.4, 8: 0.4, 9: 0.4 };
      // Sliding window: last N answers per table for mastery check
      const history = {};  // { table: [true, false, ...] }

      return {
        getXp()    { return xp; },
        getLevel() { return level; },

        // Add XP; detect level-up with surplus carry-over
        // Returns true if a level-up occurred
        addXp(points) {
          xp += points;
          const threshold = XpCalculator.getLevelThreshold(level);
          if (xp >= threshold) {
            xp -= threshold;  // carry over surplus XP (not xp = 0)
            level++;
            return true;      // signal level-up to caller
          }
          return false;
        },

        // EWMA: recent answers weighted more
        updateAccuracy(table, isCorrect) {
          const prev = accuracy[table] !== undefined ? accuracy[table] : 0.5;
          accuracy[table] = prev * (1 - CONFIG.ACCURACY_ALPHA) +
                            (isCorrect ? 1 : 0) * CONFIG.ACCURACY_ALPHA;
          // Update sliding window for mastery check
          if (!history[table]) history[table] = [];
          history[table].push(isCorrect);
          if (history[table].length > CONFIG.MASTERY_WINDOW) {
            history[table].shift();
          }
        },

        getAccuracy(table) {
          return accuracy[table] !== undefined ? accuracy[table] : 0.5;
        },

        // Mastery: 80%+ correct over last MASTERY_WINDOW answers for this table
        isMastered(table) {
          const h = history[table] || [];
          if (h.length < CONFIG.MASTERY_WINDOW) return false;
          return h.filter(Boolean).length / h.length >= CONFIG.MASTERY_THRESHOLD;
        },

        toJSON() {
          return { xp, level, accuracy: Object.assign({}, accuracy),
                   history: Object.assign({}, history) };
        },

        // Security: only copy explicitly named keys — no Object.assign(this, data) spread
        // Handles JSON string-keyed accuracy/history objects (JSON.parse coerces numeric keys to strings)
        fromJSON(data) {
          if (!data || typeof data !== 'object') return;
          // Validate types before assignment
          xp    = (typeof data.xp === 'number' && data.xp >= 0) ? data.xp : 0;
          level = (typeof data.level === 'number' && data.level >= 1)
                    ? Math.floor(data.level) : 1;
          if (data.accuracy && typeof data.accuracy === 'object') {
            Object.entries(data.accuracy).forEach(([k, v]) => {
              const table = parseInt(k, 10);
              if (table >= 1 && table <= 9 && typeof v === 'number' && v >= 0 && v <= 1) {
                accuracy[table] = v;
              }
            });
          }
          if (data.history && typeof data.history === 'object') {
            Object.entries(data.history).forEach(([k, v]) => {
              const table = parseInt(k, 10);
              if (table >= 1 && table <= 9 && Array.isArray(v)) {
                // Only keep boolean values; clamp to window size
                history[table] = v.filter(x => typeof x === 'boolean')
                                   .slice(-CONFIG.MASTERY_WINDOW);
              }
            });
          }
        },

        reset() {
          xp    = 0;
          level = 1;
          CONFIG.EASY_TABLES.forEach(t => { accuracy[t] = 0.5; delete history[t]; });
          CONFIG.HARD_TABLES.forEach(t => { accuracy[t] = 0.4; delete history[t]; });
        }
      };
    })();

    /* ==========================================================
       MODULE 4: PersistenceStore
       Full localStorage implementation — Plan 02
       Versioned JSON save/load with validation and QuotaExceededError handling
    ========================================================== */
    const PersistenceStore = (() => {
      const KEY     = CONFIG.DUNGEON.SAVE_KEY_V2;
      const VERSION = 2;

      function defaults() {
        return {
          version:  VERSION,
          xp:       0,
          level:    1,
          accuracy: { 1: 0.5, 2: 0.5, 3: 0.5, 4: 0.5, 5: 0.5,
                      6: 0.4, 7: 0.4, 8: 0.4, 9: 0.4 },
          history:  {}
        };
      }

      // Auto-migration from v1 save — runs once per user; v1 key is preserved
      function migrate() {
        try {
          const raw = localStorage.getItem(CONFIG.SAVE_KEY);
          if (raw === null) return null;

          let data;
          try {
            data = JSON.parse(raw);
          } catch (e) {
            return null;
          }

          // Strict version check — only migrate exact v1 saves
          if (data.version !== 1) return null;

          // Validate required fields before writing v2
          if (typeof data.xp !== 'number' || !isFinite(data.xp) || data.xp < 0) {
            console.warn('[MathLab] v1 save invalid — skipping migration');
            return null;
          }
          if (typeof data.level !== 'number' || !Number.isInteger(data.level) ||
              data.level < 1) {
            console.warn('[MathLab] v1 save invalid — skipping migration');
            return null;
          }

          // Sanitise accuracy and history before writing to disk — same rules as fromJSON
          function sanitiseAccuracy(raw) {
            const out = {};
            Object.entries(raw).forEach(([k, v]) => {
              const t = parseInt(k, 10);
              if (t >= 1 && t <= 9 && typeof v === 'number' && v >= 0 && v <= 1) out[t] = v;
            });
            return out;
          }
          function sanitiseHistory(raw) {
            const out = {};
            Object.entries(raw).forEach(([k, v]) => {
              const t = parseInt(k, 10);
              if (t >= 1 && t <= 9 && Array.isArray(v)) {
                out[t] = v.filter(x => typeof x === 'boolean').slice(-CONFIG.MASTERY_WINDOW);
              }
            });
            return out;
          }

          const v2Payload = {
            version:  2,
            xp:       data.xp,
            level:    data.level,
            accuracy: sanitiseAccuracy(data.accuracy || {}),
            history:  sanitiseHistory(data.history  || {})
          };

          try {
            localStorage.setItem(KEY, JSON.stringify(v2Payload));
          } catch (e) {
            // QuotaExceededError or similar — return null, no loop possible
            return null;
          }

          console.info('[MathLab] Migrated save from v1 → v2');
          return v2Payload;
        } catch (e) {
          return null;
        }
      }

      return {
        load() {
          try {
            const raw = localStorage.getItem(KEY);
            if (raw === null) {
              // No v2 save found — attempt migration from v1
              const migrated = migrate();
              if (migrated !== null) {
                return migrated;  // bootstrap caller applies fromJSON uniformly (same as non-migration path)
              }
              return defaults();
            }

            let data;
            try {
              data = JSON.parse(raw);
            } catch (e) {
              console.warn('[MathLab] Save data corrupt — using defaults');
              return defaults();
            }

            if (data.version !== VERSION) {
              console.warn('[MathLab] Save version mismatch — using defaults');
              return defaults();
            }

            // Validate top-level numeric fields
            if (typeof data.xp !== 'number' || !isFinite(data.xp) || data.xp < 0) {
              console.warn('[MathLab] Save data invalid (xp) — using defaults');
              return defaults();
            }
            if (typeof data.level !== 'number' || !Number.isInteger(data.level) ||
                data.level < 1) {
              console.warn('[MathLab] Save data invalid (level) — using defaults');
              return defaults();
            }

            return data;
          } catch (e) {
            console.warn('[MathLab] Load failed:', e);
            return defaults();
          }
        },

        save(playerState) {
          try {
            const serialized = JSON.stringify({
              version: VERSION,
              ...playerState.toJSON()
            });
            localStorage.setItem(KEY, serialized);
          } catch (e) {
            if (e.name === 'QuotaExceededError') {
              console.warn('[MathLab] localStorage full — progress may not save');
            } else {
              console.warn('[MathLab] Save failed:', e);
            }
          }
        }
      };
    })();

    /* ==========================================================
       MODULE 5: QuestionSelector — full weighted implementation (Plan 03)
       Bias hard tables (6–9) by ~70%, boost struggling tables 1.5×,
       reduce mastered tables; Fisher-Yates shuffle for unbiased position.
    ========================================================== */
    const QuestionSelector = (() => {

      // Fisher-Yates uniform shuffle — not sort(random) which is biased
      // In-place, returns shuffled array.
      const shuffle = (arr) => {
        for (let i = arr.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
      };

      // Build weight map for all 9 tables driven by playerState accuracy.
      // Hard tables: base weight (1 - acc)^1.5, boosted if struggling, reduced if mastered.
      // Easy tables: base weight (1 - acc)^0.8 * 0.3 so they average ~30% total selection.
      // Edge case: if total weight rounds to zero (all mastered), reset to equal weights.
      const calculateWeights = (playerState) => {
        const weights = {};

        CONFIG.HARD_TABLES.forEach(table => {
          const acc = playerState.getAccuracy(table);
          let w = Math.pow(1 - acc, 1.5);
          if (acc < CONFIG.STRUGGLE_THRESHOLD) w *= CONFIG.STRUGGLE_BOOST;
          if (playerState.isMastered(table))   w *= 0.3;
          weights[table] = w;
        });

        CONFIG.EASY_TABLES.forEach(table => {
          const acc = playerState.getAccuracy(table);
          let w = Math.pow(1 - acc, 0.8) * 0.3;
          if (playerState.isMastered(table)) w *= 0.3;
          weights[table] = w;
        });

        // Guard: if all weights are ~zero (all tables mastered), reset to equal
        const total = Object.values(weights).reduce((a, b) => a + b, 0);
        if (total < 1e-9) {
          const allTables = [...CONFIG.HARD_TABLES, ...CONFIG.EASY_TABLES];
          allTables.forEach(t => { weights[t] = 1.0; });
        }

        return weights;
      };

      // Weighted random table selection from weights map.
      // Rolls a random number in [0, total) and walks the weights.
      const weightedRandom = (weights) => {
        const total = Object.values(weights).reduce((a, b) => a + b, 0);
        let roll = Math.random() * total;
        for (const [table, w] of Object.entries(weights)) {
          roll -= w;
          if (roll <= 0) return parseInt(table, 10);
        }
        // Fallback (floating point rounding edge): return first hard table
        return CONFIG.HARD_TABLES[0];
      };

      // Distractor generation: ±1/±2 multiplicand on same table (CONTEXT.md locked decision).
      // Adds one wrong-table distractor (from a different hard table) for variety.
      // Deduplicates: all candidates filtered v !== answer && v > 0.
      // Returns exactly 3 distractors — pads if necessary, never returns duplicates.
      const generateDistractors = (answer, table, multiplicand) => {
        const pool = new Set();

        // Primary candidates: ±1 and ±2 multiplicand on the same table
        [-2, -1, 1, 2].forEach(d => {
          const v = table * (multiplicand + d);
          if (v > 0 && v !== answer) pool.add(v);
        });

        // One wrong-table distractor (pick first hard table that isn't current)
        const wrongTable = CONFIG.HARD_TABLES.find(t => t !== table) || CONFIG.EASY_TABLES[0];
        const wrongVal = wrongTable * multiplicand;
        if (wrongVal > 0 && wrongVal !== answer) pool.add(wrongVal);

        // Extend if still under 3: try ±3 offsets on same table
        if (pool.size < 3) {
          [-3, 3].forEach(d => {
            const v = table * (multiplicand + d);
            if (v > 0 && v !== answer) pool.add(v);
          });
        }

        // Fisher-Yates shuffle the pool, pick first 3
        const poolArr = shuffle([...pool]);
        const chosen = poolArr.slice(0, 3);

        // Last-resort pad (should be unreachable for multiplicand 1–10 range)
        while (chosen.length < 3) {
          let pad = answer + chosen.length + 1;
          while (pad === answer || chosen.includes(pad)) pad++;
          chosen.push(pad);
        }

        return chosen;
      };

      return {
        // Full weighted selectNext — accepts PlayerState to read accuracy
        selectNext(playerState) {
          const weights     = calculateWeights(playerState);
          const table       = weightedRandom(weights);
          const multiplicand = Math.floor(Math.random() * 10) + 1;
          const answer      = table * multiplicand;
          const distractors = generateDistractors(answer, table, multiplicand);
          const options     = shuffle([answer, ...distractors]);
          return {
            table,
            multiplicand,
            answer,
            options,
            question: table + ' × ' + multiplicand  // × (multiplication sign)
          };
        }
      };
    })();

    /* MODULE 6: GameFSM — Dungeon state machine (Phase 2) */
    const GameFSM = (() => {
      let state = 'EXPLORE';

      // Legal transitions: source state → Set of valid destination states
      const TRANSITIONS = {
        EXPLORE:       ['COMBAT'],
        COMBAT:        ['LOOT', 'FLOOR_SUMMARY', 'DEAD'],
        LOOT:          ['COMBAT', 'FLOOR_SUMMARY'],
        FLOOR_SUMMARY: ['EXPLORE', 'DEAD'],
        DEAD:          ['EXPLORE']
      };

      return {
        getState() {
          return state;
        },

        transition(next) {
          const allowed = TRANSITIONS[state];
          if (!allowed || !allowed.includes(next)) {
            throw new Error('[GameFSM] Illegal transition: ' + state + ' → ' + next);
          }
          state = next;
        },

        reset() {
          state = 'EXPLORE';
        }
      };
    })();
    window.GameFSM = GameFSM;

    /* MODULE 7: FloorConfig — Enemy definitions per floor (Phase 2) */
    const FloorConfig = (() => {
      const FLOORS = {
        1: { enemy: 'Goblin',   emoji: '👺', hp: CONFIG.DUNGEON.GOBLIN_HP,   xpReward: CONFIG.DUNGEON.GOBLIN_XP,   tablePools: [2, 3, 5] },
        2: { enemy: 'Skeleton', emoji: '💀', hp: CONFIG.DUNGEON.SKELETON_HP, xpReward: CONFIG.DUNGEON.SKELETON_XP, tablePools: [4, 6, 7] },
        3: { enemy: 'Dragon',   emoji: '🐉', hp: CONFIG.DUNGEON.DRAGON_HP,   xpReward: CONFIG.DUNGEON.DRAGON_XP,   tablePools: [7, 8, 9] },
        4: { enemy: 'Dragon Lord', emoji: '🐲', hp: CONFIG.DUNGEON.FINAL_BOSS_HP, xpReward: CONFIG.DUNGEON.FINAL_BOSS_XP, tablePools: [7, 8, 9] }
      };

      return {
        getFloor(floorNumber) {
          if (!FLOORS[floorNumber]) {
            throw new Error('[FloorConfig] Unknown floor: ' + floorNumber);
          }
          const f = FLOORS[floorNumber];
          return Object.assign({}, f, { tablePools: [...f.tablePools] });
        },

        getAllFloors() {
          return Object.keys(FLOORS).map(k => {
            const num = parseInt(k, 10);
            return Object.assign({ floor: num }, FLOORS[num], { tablePools: [...FLOORS[num].tablePools] });
          });
        }
      };
    })();
    window.FloorConfig = FloorConfig;

    /* MODULE 8: DungeonState — Session-scoped dungeon state (Phase 2, TECH2-03) */
    const DungeonState = (() => {
      // Session-scoped only — never written to localStorage (TECH2-03)
      let floor    = 1;
      let room     = 0;
      let playerHP = CONFIG.DUNGEON.PLAYER_HP;
      let enemyHP  = null;  // null = no active enemy
      let loot     = { sword: false, shield: false, potions: 0 };

      return {
        // Resets dungeon session state only — PlayerState XP and level are untouched (ADHD-03).
        init(floorNumber) {
          floor    = floorNumber;
          room     = 0;
          playerHP = CONFIG.DUNGEON.PLAYER_HP;
          enemyHP  = null;
          loot     = { sword: false, shield: false, potions: 0 };
        },

        // Returns a plain-object snapshot — callers cannot mutate internal state
        get() {
          return {
            floor,
            room,
            playerHP,
            enemyHP,
            loot: Object.assign({}, loot)
          };
        },

        // Sets current enemy HP; null clears active enemy
        setEnemyHP(hp) {
          enemyHP = hp;
        },

        // Sets player HP; clamps to minimum 0 (never negative)
        setPlayerHP(hp) {
          playerHP = Math.max(0, hp);
        },

        // Advances to the next room
        advanceRoom() {
          room += 1;
        },

        // Applies loot per LOOT-02 (max 1 sword/shield per run, unlimited potions).
        // Returns true if loot was applied, false if duplicate (ignored).
        // Throws if itemName is not a recognised item.
        applyLoot(itemName) {
          if (itemName === 'sword' || itemName === 'shield') {
            if (loot[itemName]) return false;  // duplicate ignored (LOOT-02)
            loot[itemName] = true;
            return true;
          }
          if (itemName === 'potion') {
            loot.potions += 1;
            return true;
          }
          throw new Error('[DungeonState] Unknown loot item: ' + itemName);
        }
      };
    })();
    window.DungeonState = DungeonState;

    /* MODULE 9: CombatEngine — Combat resolution and HP math (Phase 2) */
    const CombatEngine = (() => {
      let currentFloor = null;
      let floorDef     = null;  // FloorConfig definition for the active floor

      return {
        // Initialises combat for the given floor number.
        // Transitions FSM to COMBAT and seeds DungeonState with enemy HP.
        // Returns { enemy, emoji, enemyHP, playerHP }.
        startCombat(floorNumber) {
          if (GameFSM.getState() === 'COMBAT') {
            throw new Error('[CombatEngine] Cannot startCombat while already in COMBAT state — caller must transition FSM to EXPLORE first');
          }
          floorDef     = FloorConfig.getFloor(floorNumber);
          currentFloor = floorNumber;
          DungeonState.init(floorNumber);           // resets playerHP, room, loot (WR-01)
          DungeonState.setEnemyHP(floorDef.hp);    // init sets enemyHP=null; seed it here
          GameFSM.transition('COMBAT');
          return {
            enemy:   floorDef.enemy,
            emoji:   floorDef.emoji,
            enemyHP: floorDef.hp,
            playerHP: DungeonState.get().playerHP
          };
        },

        // Core combat tick. All damage values read from CONFIG.DUNGEON — no magic numbers.
        // Loot snapshot taken once per call to avoid double-reads.
        // Returns { enemyHP, playerHP, killed, died, leveledUp, effectiveDamageCorrect, effectiveDamageWrong }.
        resolveAnswer(isCorrect) {
          if (!floorDef) {
            throw new Error('[CombatEngine] resolveAnswer called before startCombat');
          }

          // Loot-aware damage computation — read snapshot once per call
          const lootSnapshot = DungeonState.get().loot;
          const effectiveDamageCorrect = CONFIG.DUNGEON.DAMAGE_CORRECT +
            (lootSnapshot.sword ? CONFIG.DUNGEON.SWORD_BONUS : 0);
          const effectiveDamageWrong = Math.max(0, CONFIG.DUNGEON.DAMAGE_WRONG -
            (lootSnapshot.shield ? CONFIG.DUNGEON.SHIELD_REDUCTION : 0));

          if (isCorrect) {
            const newEnemyHP = Math.max(0, DungeonState.get().enemyHP - effectiveDamageCorrect);
            DungeonState.setEnemyHP(newEnemyHP);

            if (newEnemyHP === 0) {
              // Enemy killed — award XP and transition to LOOT
              const leveledUp = PlayerState.addXp(floorDef.xpReward);
              GameFSM.transition('LOOT');
              return { enemyHP: 0, playerHP: DungeonState.get().playerHP, killed: true, died: false, leveledUp, effectiveDamageCorrect, effectiveDamageWrong };
            }

            return { enemyHP: newEnemyHP, playerHP: DungeonState.get().playerHP, killed: false, died: false, leveledUp: false, effectiveDamageCorrect, effectiveDamageWrong };

          } else {
            const newPlayerHP = Math.max(0, DungeonState.get().playerHP - effectiveDamageWrong);
            DungeonState.setPlayerHP(newPlayerHP);

            if (newPlayerHP === 0) {
              // Player died — transition to DEAD
              GameFSM.transition('DEAD');
              return { enemyHP: DungeonState.get().enemyHP, playerHP: 0, killed: false, died: true, leveledUp: false, effectiveDamageCorrect, effectiveDamageWrong };
            }

            return { enemyHP: DungeonState.get().enemyHP, playerHP: newPlayerHP, killed: false, died: false, leveledUp: false, effectiveDamageCorrect, effectiveDamageWrong };
          }
        },

        // Resets CombatEngine closure state — call alongside GameFSM.reset() on new run (WR-03)
        reset() {
          currentFloor = null;
          floorDef     = null;
        },

        // Returns a snapshot of current combat state (floorDef exposes tablePools for Phase 3 use — DIFF-02)
        getState() {
          if (!floorDef) {
            throw new Error('[CombatEngine] getState called before startCombat');
          }
          return {
            floor:    currentFloor,
            floorDef,
            enemyHP:  DungeonState.get().enemyHP,
            playerHP: DungeonState.get().playerHP
          };
        }
      };
    })();
    window.CombatEngine = CombatEngine;

    /* MODULE 10: App — JS routing layer (mode + transition + renderScreen)
       Defined OUTSIDE DOMContentLoaded so window.App is available immediately.
       nextQuestion() is a stub here; DOMContentLoaded wires App._nextQuestion
       once Renderer and QuestionSelector are in scope.
    */
    const App = (() => {
      let mode = 'quiz';  // 'quiz' | 'dungeon'

      // renderScreen is the ONLY function that writes data-screen on main.
      // Called exclusively from transition() — no other code path may call it.
      const VALID_SCREENS = new Set(['quiz', 'dungeon-map', 'combat', 'loot', 'floor-summary', 'dead']);
      function renderScreen(name) {
        if (!VALID_SCREENS.has(name)) return;
        const main = document.getElementById('game-board');
        if (main) main.setAttribute('data-screen', name);
      }

      return {
        get mode() { return mode; },

        transition(screenName) {
          mode = (screenName === 'quiz') ? 'quiz' : 'dungeon';
          renderScreen(screenName);
        },

        // Stub — real implementation wired via App._nextQuestion inside DOMContentLoaded
        nextQuestion() {
          if (typeof App._nextQuestion === 'function') App._nextQuestion();
        }
      };
    })();
    window.App = App;

    /* ==========================================================
       MODULE 10b: DungeonRunner — Orchestrates the full dungeon run loop (Phase 5)
       Defined outside DOMContentLoaded so window.DungeonRunner is available immediately.
       References DungeonRenderer and CombatInputHandler via window globals.
    ========================================================== */
    const DungeonRunner = (() => {
      let _currentFloor       = 1;
      let _floorEnemiesDefeated = 0;
      let _floorXpEarned      = 0;

      // Loot display map — internal constants only; no user-supplied strings reach applyLoot
      const LOOT_DISPLAY = {
        sword:  { emoji: '🗡️', name: 'Sword of Accuracy' },
        shield: { emoji: '🛡️', name: 'Shield of Resilience' },
        potion: { emoji: '🧪', name: 'Health Potion' }
      };

      return {
        // Updates dungeon-map panel text with floor number + enemy preview
        updateDungeonMap(floorNumber) {
          const floorDef = FloorConfig.getFloor(floorNumber);
          document.getElementById('dungeon-map-floor').textContent = 'Floor ' + floorNumber;
          document.getElementById('dungeon-map-enemy').textContent = floorDef.emoji + ' ' + floorDef.enemy;
        },

        // Starts a brand-new dungeon run from floor 1
        startRun() {
          _currentFloor         = 1;
          _floorEnemiesDefeated = 0;
          _floorXpEarned        = 0;
          DungeonState.init(1);
          DungeonRunner.updateDungeonMap(1);
          App.transition('dungeon-map');
        },

        // Advances to the next room on the current floor, sets enemy HP, renders, starts combat
        enterCombat() {
          DungeonState.advanceRoom();
          const ds       = DungeonState.get();
          const floorDef = FloorConfig.getFloor(_currentFloor);
          const isBoss   = ds.room >= CONFIG.DUNGEON.ROOMS_PER_FLOOR;
          const enemyHP  = isBoss
            ? Math.round(floorDef.hp * CONFIG.DUNGEON.BOSS_HP_MULT)
            : floorDef.hp;

          // Preserve HP and loot before startCombat() resets them via DungeonState.init()
          const savedHP   = DungeonState.get().playerHP;
          const savedLoot = DungeonState.get().loot;

          // Reset FSM to EXPLORE so CombatEngine.startCombat() can proceed
          if (GameFSM.getState() !== 'EXPLORE') GameFSM.reset();

          // startCombat() transitions FSM to COMBAT and calls DungeonState.init() (resets HP + loot)
          CombatEngine.startCombat(_currentFloor);

          // Restore HP and loot overwritten by init()
          DungeonState.setPlayerHP(savedHP);
          if (savedLoot.sword)  DungeonState.applyLoot('sword');
          if (savedLoot.shield) DungeonState.applyLoot('shield');
          // Potions are consumed on pickup — not re-applied on room transition

          // Override enemy HP with correct value (boss or normal)
          DungeonState.setEnemyHP(enemyHP);

          DungeonRenderer.renderCombat({
            floor:    _currentFloor,
            room:     ds.room,
            enemy:    floorDef.enemy,
            emoji:    floorDef.emoji,
            enemyHP:  enemyHP,
            playerHP: savedHP
          });

          App.transition('combat');
          // CombatInputHandler is defined inside DOMContentLoaded but exported on window
          window.CombatInputHandler.beginCombat();
        },

        // Called after enemy is killed — decides loot drop, then routes to next room or floor-summary
        afterKill() {
          _floorEnemiesDefeated += 1;
          const ds       = DungeonState.get();
          const floorDef = FloorConfig.getFloor(_currentFloor);
          const isBoss   = ds.room >= CONFIG.DUNGEON.ROOMS_PER_FLOOR;
          const xpThisKill = isBoss
            ? Math.round(floorDef.xpReward * CONFIG.DUNGEON.BOSS_HP_MULT)
            : floorDef.xpReward;
          _floorXpEarned += xpThisKill;

          // Loot drop: boss always drops, regular enemies drop at LOOT_DROP_RATE probability
          const shouldDrop = isBoss ? true : Math.random() < CONFIG.DUNGEON.LOOT_DROP_RATE;

          if (shouldDrop) {
            const items    = ['sword', 'shield', 'potion'];
            const itemName = items[Math.floor(Math.random() * items.length)];
            DungeonState.applyLoot(itemName);

            // Potion: restore HP immediately on pickup
            if (itemName === 'potion') {
              const healedHP = Math.min(
                CONFIG.DUNGEON.PLAYER_HP,
                DungeonState.get().playerHP + CONFIG.DUNGEON.POTION_HEAL
              );
              DungeonState.setPlayerHP(healedHP);
            }

            DungeonRenderer.renderLoot(LOOT_DISPLAY[itemName]);
            App.transition('loot');
          } else {
            // No loot — route directly to next room or floor-summary
            DungeonRunner.afterLoot();
          }
        },

        // Called when loot is dismissed — routes to next combat room or floor-summary
        afterLoot() {
          const ds = DungeonState.get();
          if (ds.room >= CONFIG.DUNGEON.ROOMS_PER_FLOOR) {
            // Floor cleared — show summary
            DungeonRenderer.renderFloorComplete({
              floor:            _currentFloor,
              enemiesDefeated:  _floorEnemiesDefeated,
              xpEarned:         _floorXpEarned,
              hpRemaining:      ds.playerHP
            });
            // Override headline on the final floor
            if (_currentFloor >= CONFIG.DUNGEON.MAX_FLOORS) {
              document.getElementById('floor-summary-headline').textContent = 'Dungeon Cleared!';
            }
            App.transition('floor-summary');
          } else {
            // More rooms remain on this floor
            DungeonRunner.enterCombat();
          }
        },

        // Called from floor-summary Advance button — proceeds to next floor or back to quiz
        advanceFloor() {
          if (_currentFloor < CONFIG.DUNGEON.MAX_FLOORS) {
            _currentFloor         += 1;
            _floorEnemiesDefeated  = 0;
            _floorXpEarned         = 0;
            DungeonState.init(_currentFloor);
            DungeonRunner.updateDungeonMap(_currentFloor);
            App.transition('dungeon-map');
          } else {
            // Dungeon complete — return to quiz
            CombatEngine.reset();
            GameFSM.reset();
            App.transition('quiz');
          }
        },

        // Called from dead-retry button — resets current floor HP/loot, XP preserved (ADHD-03)
        retryFloor() {
          _floorEnemiesDefeated = 0;
          _floorXpEarned        = 0;
          // DungeonState.init resets HP/loot/room only — PlayerState XP untouched (ADHD-03)
          DungeonState.init(_currentFloor);
          GameFSM.reset();
          CombatEngine.reset();
          DungeonRunner.updateDungeonMap(_currentFloor);
          App.transition('dungeon-map');
        }
      };
    })();
    window.DungeonRunner = DungeonRunner;

    /* ==========================================================
       MODULE 11: DungeonRenderer
       Owns all DOM writes for dungeon screens. Defined outside
       DOMContentLoaded so window.DungeonRenderer is available as
       soon as the script block executes (before DOM ready).
       CombatInputHandler (Plan 03) calls these methods after each
       combat answer. This module must be loaded before Plan 03.
    ========================================================== */
    const DungeonRenderer = (() => {

      // Tracks current enemy max HP for percentage calculation.
      // Updated in renderCombat() from CombatEngine.getState().floorDef.hp.
      let _currentEnemyMaxHP = CONFIG.DUNGEON.GOBLIN_HP;

      // Tracks the current enemy name for renderCombatQuestion() flavor refresh.
      let _currentEnemy = '';

      // Tracks last shown flavor line index per enemy name — prevents same-line repetition.
      const lastFlavorIndex = {};

      // FLAVOR arrays — 3 lines per enemy type.
      // Each array uses textContent-safe RPG text.
      // Words "correct", "wrong", "answer", "question" must NOT appear here.
      const FLAVOR = {
        Goblin: [
          /* PLACEHOLDER — Phase 6 replaces with user-approved content */
          'The goblin snarls at you.',
          'It bares its rotten teeth.',
          'The goblin charges forward.'
        ],
        Skeleton: [
          /* PLACEHOLDER — Phase 6 replaces with user-approved content */
          'Bones rattle in the dark.',
          'Its hollow eye sockets stare.',
          'The skeleton raises its blade.'
        ],
        Dragon: [
          /* PLACEHOLDER — Phase 6 replaces with user-approved content */
          'Smoke curls from its nostrils.',
          'The dragon lets out a low rumble.',
          'Its scales shimmer like obsidian.'
        ],
        'Dragon Lord': [
          'An ancient power stirs in the darkness.',
          'Its roar shakes the dungeon walls.',
          'The Dragon Lord opens one eye.'
        ]
      };

      // Returns a flavor line for the given enemy, avoiding the last-shown line.
      // Uses a do-while loop to guarantee no immediate repetition when lines.length > 1.
      function getFlavorText(enemyName) {
        const lines = FLAVOR[enemyName];
        if (!lines || lines.length === 0) return '';

        let idx;
        if (lines.length === 1) {
          idx = 0;
        } else {
          do {
            idx = Math.floor(Math.random() * lines.length);
          } while (idx === lastFlavorIndex[enemyName]);
        }

        lastFlavorIndex[enemyName] = idx;
        return lines[idx];
      }

      return {
        // Initialises the combat panel display for a given state snapshot.
        // Call after startCombat() so CombatEngine.getState() is available.
        // state: { floor, room, enemy, emoji, enemyHP, playerHP }
        renderCombat(state) {
          _currentEnemy = state.enemy;

          // Read floorDef.hp from CombatEngine to set the percentage denominator.
          // Safe here: renderCombat() is only called after startCombat() has run.
          _currentEnemyMaxHP = CombatEngine.getState().floorDef.hp;

          document.getElementById('combat-room-indicator').textContent =
            'Floor ' + state.floor + ' · Room ' + state.room + '/5';

          document.getElementById('combat-enemy-sprite').textContent = state.emoji;

          this.updateHP(state.enemyHP, state.playerHP);

          document.getElementById('combat-feedback').textContent = '';

          document.getElementById('combat-flavor').textContent =
            getFlavorText(state.enemy);
        },

        // Clears and rebuilds the combat options list from a question object.
        // questionObj: { question, answer, options, table, multiplicand }
        renderCombatQuestion(questionObj) {
          const list = document.getElementById('combat-options-list');

          // innerHTML = '' is the only allowed innerHTML use in this module —
          // clearing the list container (established Renderer pattern).
          list.innerHTML = '';

          // Clear feedback text for next question cycle.
          document.getElementById('combat-feedback').textContent = '';

          // Show the multiplication expression so the player knows what to answer.
          const qtextEl = document.getElementById('combat-question-text');
          if (qtextEl) qtextEl.textContent = questionObj.question;

          // Refresh flavor text for the current enemy.
          const flavorEl = document.getElementById('combat-flavor');
          if (flavorEl && _currentEnemy) {
            flavorEl.textContent = getFlavorText(_currentEnemy);
          }

          // Build option items using createElement/appendChild — textContent only.
          // Uses name="combat-answer" (not "answer") to avoid v1 radio group collision.
          questionObj.options.forEach((val, i) => {
            const li    = document.createElement('li');
            li.className = 'option-item';

            const input = document.createElement('input');
            input.type  = 'radio';
            input.name  = 'combat-answer';
            input.id    = 'combat-opt-' + i;
            input.value = String(val);

            const label = document.createElement('label');
            label.setAttribute('for', 'combat-opt-' + i);
            label.textContent = String(val);

            li.appendChild(input);
            li.appendChild(label);
            list.appendChild(li);
          });
        },

        // Updates both HP bars using CSS width% transitions.
        // Clamps percentages to [0, 100] to handle edge cases.
        updateHP(enemyHP, playerHP) {
          const enemyPct = Math.max(0, Math.min(100,
            (enemyHP / _currentEnemyMaxHP) * 100));
          const playerPct = Math.max(0, Math.min(100,
            (playerHP / CONFIG.DUNGEON.PLAYER_HP) * 100));

          document.getElementById('enemy-hp-fill').style.width  = enemyPct + '%';
          document.getElementById('player-hp-fill').style.width = playerPct + '%';
        },

        // Creates a floating damage number span and appends it to targetEl.
        // isHit: true = player hit enemy (green, .damage-number--hit)
        //        false = player took damage (red, .damage-number--damage)
        // Span is removed on animationend; 600ms fallback handles missed events.
        showDamageNumber(targetEl, value, isHit) {
          const span = document.createElement('span');
          span.className = 'damage-number ' +
            (isHit ? 'damage-number--hit' : 'damage-number--damage');
          span.textContent = '-' + value;

          targetEl.appendChild(span);

          // Primary cleanup: CSS animation fires animationend on completion.
          span.addEventListener('animationend', () => {
            span.remove();
          }, { once: true });

          // Safety fallback: 600ms covers the 400ms animation + buffer.
          // Pitfall 3 (RESEARCH.md): animationend may not fire on low-end devices.
          setTimeout(() => {
            if (span.parentNode) span.remove();
          }, 600);
        },

        // Writes RPG feedback text to #combat-feedback.
        // Text is cleared when renderCombatQuestion() runs next — no auto-clear timer.
        showFeedback(text) {
          document.getElementById('combat-feedback').textContent = text;
        },

        // Populates the floor-summary panel with cleared-floor stats.
        // summary: { floor, enemiesDefeated, xpEarned, hpRemaining }
        // Caller (CombatInputHandler / Phase 5) handles screen transition.
        renderFloorComplete(summary) {
          document.getElementById('floor-summary-headline').textContent =
            'Floor ' + summary.floor + ' Cleared!';
          document.getElementById('floor-summary-enemies').textContent =
            'Enemies defeated: ' + summary.enemiesDefeated;
          document.getElementById('floor-summary-xp').textContent =
            'XP earned: ' + summary.xpEarned;
          document.getElementById('floor-summary-hp').textContent =
            'HP remaining: ' + summary.hpRemaining;
        },

        // Populates the loot panel with item display.
        // item: { emoji, name }
        renderLoot(item) {
          document.getElementById('loot-emoji').textContent = item.emoji;
          document.getElementById('loot-name').textContent  = item.name;
        },

        // No-op in Phase 4 — dead panel HTML from Plan 01 is static.
        // Phase 5 may extend this method if dynamic content is needed.
        renderDead() {}
      };
    })();
    window.DungeonRenderer = DungeonRenderer;

    /* ==========================================================
       DOM CACHE + RENDERER + INPUT HANDLER + APP
       These live inside DOMContentLoaded — they access DOM elements
    ========================================================== */
    document.addEventListener('DOMContentLoaded', () => {

      /* ----------------------------------------------------------
         DOM Cache — populated once at init; never queried again
      ---------------------------------------------------------- */
      const DOM = {};
      DOM.levelDisplay   = document.getElementById('level-display');
      DOM.xpBar          = document.getElementById('xp-bar');
      DOM.questionText   = document.getElementById('question-text');
      DOM.optionsList    = document.getElementById('options-list');
      DOM.levelupOverlay = document.getElementById('levelup-overlay');
      DOM.questionLegend = document.getElementById('question-legend');

      /* ----------------------------------------------------------
         MODULE 6: Renderer
         All DOM updates go through here — no DOM writes elsewhere
      ---------------------------------------------------------- */
      const Renderer = {
        updateHud(xp, level) {
          DOM.levelDisplay.textContent = 'Level ' + level;
          this.renderXpBar(xp, level);
        },

        renderXpBar(xp, level) {
          const threshold   = XpCalculator.getLevelThreshold(level);
          // Clamp: prevent negative or over-full bar on edge cases (e.g. level-up surplus)
          const filledCount = Math.min(
            CONFIG.SEGMENT_COUNT,
            Math.max(0, Math.floor((xp / threshold) * CONFIG.SEGMENT_COUNT))
          );
          // Use DocumentFragment for batch DOM insertion (performance)
          const frag = document.createDocumentFragment();
          // Re-create the XP label so it survives the innerHTML clear below
          const xpLabel = document.createElement('span');
          xpLabel.className = 'xp-label';
          xpLabel.textContent = 'XP';
          frag.appendChild(xpLabel);
          for (let i = 0; i < CONFIG.SEGMENT_COUNT; i++) {
            const seg = document.createElement('div');
            seg.className = 'xp-segment' + (i < filledCount ? ' filled' : '');
            frag.appendChild(seg);
          }
          DOM.xpBar.innerHTML = '';
          DOM.xpBar.appendChild(frag);
          // Accessibility tooltip: show numeric progress on hover
          DOM.xpBar.title = xp + ' / ' + threshold + ' XP';
        },

        showQuestion(questionObj) {
          // Security: textContent, never innerHTML
          DOM.questionText.textContent = questionObj.question + ' = ?';
          DOM.questionLegend.textContent = 'Choose the correct answer';
          DOM.optionsList.innerHTML = '';
          questionObj.options.forEach((val, i) => {
            const li    = document.createElement('li');
            li.className = 'option-item';

            const input = document.createElement('input');
            input.type  = 'radio';
            input.name  = 'answer';
            input.id    = 'opt-' + i;
            input.value = String(val);

            const label = document.createElement('label');
            label.setAttribute('for', 'opt-' + i);
            label.textContent = String(val);  // textContent, not innerHTML

            li.appendChild(input);
            li.appendChild(label);
            DOM.optionsList.appendChild(li);
          });
        },

        showLevelUpOverlay(newLevel) {
          DOM.levelupOverlay.textContent = 'LEVEL ' + newLevel + '!';
          DOM.levelupOverlay.classList.add('active');
          DOM.levelupOverlay.addEventListener('animationend', () => {
            DOM.levelupOverlay.classList.remove('active');
          }, { once: true });
        },

        clearFeedback() {
          const items = DOM.optionsList.querySelectorAll('.option-item');
          items.forEach(item => {
            item.classList.remove('correct', 'wrong', 'disabled');
          });
        }
      };

      /* ----------------------------------------------------------
         MODULE 7: InputHandler
         Event delegation on optionsList; 1s feedback lock
      ---------------------------------------------------------- */
      const InputHandler = {
        currentQuestion: null,
        locked: false,

        setup() {
          // Change listener on the fieldset captures both click and arrow-key navigation.
          // Radio inputs fire 'change' on arrow-key selection; 'click' alone misses it.
          // event.target.value is the canonical source (set to String(val) in showQuestion).
          document.getElementById('question-fieldset').addEventListener('change', (event) => {
            if (InputHandler.locked) return;
            if (event.target.tagName !== 'INPUT' || event.target.type !== 'radio') return;
            InputHandler.handleAnswer(event.target.value);
          });
        },

        handleAnswer(selectedValue) {
          if (App.mode !== 'quiz') return;
          InputHandler.locked = true;

          // Disable all options immediately
          const items = Array.from(DOM.optionsList.querySelectorAll('.option-item'));
          items.forEach(item => item.classList.add('disabled'));

          // Validate: parse selected value as integer
          const selected = parseInt(selectedValue, 10);
          const isCorrect = selected === InputHandler.currentQuestion.answer;

          // Match by input value — canonical source, not label text
          const findItemByValue = (val) =>
            items.find(item => {
              const inp = item.querySelector('input[type="radio"]');
              return inp && parseInt(inp.value, 10) === val;
            });

          if (isCorrect) {
            const clickedItem = findItemByValue(selected);
            if (clickedItem) clickedItem.classList.add('correct');

            // Award XP
            const xpAwarded = XpCalculator.calculateXp(
              InputHandler.currentQuestion.table
            );
            const leveledUp = PlayerState.addXp(xpAwarded);
            if (leveledUp) {
              Renderer.showLevelUpOverlay(PlayerState.getLevel());
            }
          } else {
            const clickedItem = findItemByValue(selected);
            if (clickedItem) clickedItem.classList.add('wrong');

            // Reveal correct answer in green
            const correctItem = findItemByValue(InputHandler.currentQuestion.answer);
            if (correctItem) correctItem.classList.add('correct');
          }

          // Update accuracy tracking and HUD
          PlayerState.updateAccuracy(
            InputHandler.currentQuestion.table, isCorrect
          );
          PersistenceStore.save(PlayerState);
          Renderer.updateHud(PlayerState.getXp(), PlayerState.getLevel());

          // Auto-advance after 1s feedback delay
          // IMPORTANT: This setTimeout is the feedback pause — NOT a visible timer.
          // No UI element changes during this window except the feedback colors.
          setTimeout(() => {
            InputHandler.locked = false;
            App.nextQuestion();
          }, CONFIG.ADVANCE_DELAY_MS);
        }
      };

      /* ----------------------------------------------------------
         CombatInputHandler
         Handles answer selection in the combat fieldset.
         Mode guard (App.mode !== 'dungeon') is first — prevents firing in quiz mode.
         Lock guard prevents re-entrant answers during the 1s feedback pause.
      ---------------------------------------------------------- */
      const CombatInputHandler = {
        locked: false,
        currentQuestion: null,

        setup() {
          document.getElementById('combat-question').addEventListener('change', (e) => {
            if (App.mode !== 'dungeon') return;
            if (CombatInputHandler.locked) return;
            if (e.target.tagName !== 'INPUT' || e.target.type !== 'radio') return;
            CombatInputHandler.handleAnswer(e.target.value);
          });
        },

        handleAnswer(selectedValue) {
          if (!CombatInputHandler.currentQuestion) return;
          CombatInputHandler.locked = true;

          const selected   = parseInt(selectedValue, 10);
          const q          = CombatInputHandler.currentQuestion;
          const isCorrect  = (selected === q.answer);
          const result     = CombatEngine.resolveAnswer(isCorrect);

          DungeonRenderer.updateHP(result.enemyHP, result.playerHP);

          if (isCorrect) {
            DungeonRenderer.showDamageNumber(
              document.getElementById('combat-enemy-area'),
              result.effectiveDamageCorrect,
              true
            );
            DungeonRenderer.showFeedback(Math.random() < 0.2 ? 'Critical hit!' : 'Attack!');
          } else {
            DungeonRenderer.showDamageNumber(
              document.getElementById('player-hp-container'),
              result.effectiveDamageWrong,
              false
            );
            DungeonRenderer.showFeedback('You took a hit!');
          }

          if (result.leveledUp) {
            Renderer.showLevelUpOverlay(PlayerState.getLevel());
            Renderer.updateHud(PlayerState.getXp(), PlayerState.getLevel());
          }

          if (result.killed) {
            CombatInputHandler.locked = false;
            DungeonRunner.afterKill();
            return;
          }

          if (result.died) {
            CombatInputHandler.locked = false;
            App.transition('dead');
            return;
          }

          setTimeout(() => {
            CombatInputHandler.locked = false;
            CombatInputHandler.nextQuestion();
          }, CONFIG.ADVANCE_DELAY_MS);
        },

        nextQuestion() {
          const q = QuestionSelector.selectNext(PlayerState);
          CombatInputHandler.currentQuestion = q;
          DungeonRenderer.renderCombatQuestion(q);
        },

        // Call this after DungeonRenderer.renderCombat() to load the first question
        // and unlock the handler. Phase 5 calls this from the room-start sequence.
        beginCombat() {
          CombatInputHandler.locked = false;
          CombatInputHandler.nextQuestion();
        }
      };
      // Export so DungeonRunner (defined outside DOMContentLoaded) can call beginCombat()
      window.CombatInputHandler = CombatInputHandler;

      /* ----------------------------------------------------------
         Button wiring — Phase 5 dungeon navigation
         All handlers delegate to DungeonRunner methods.
      ---------------------------------------------------------- */
      document.getElementById('enter-dungeon-btn').onclick  = function() { DungeonRunner.startRun(); };
      document.getElementById('enter-combat-btn').onclick   = function() { DungeonRunner.enterCombat(); };
      document.getElementById('loot-continue').onclick      = function() { DungeonRunner.afterLoot(); };
      document.getElementById('floor-summary-continue').onclick = function() { DungeonRunner.advanceFloor(); };
      document.getElementById('dead-retry').onclick         = function() { DungeonRunner.retryFloor(); };

      /* ----------------------------------------------------------
         App — wire nextQuestion() now that Renderer + QuestionSelector are in scope
      ---------------------------------------------------------- */
      App._nextQuestion = function() {
        const q = QuestionSelector.selectNext(PlayerState);
        InputHandler.currentQuestion = q;
        Renderer.showQuestion(q);
      };

      /* ----------------------------------------------------------
         Bootstrap — load saved state and start the game
      ---------------------------------------------------------- */
      const savedData = PersistenceStore.load();
      PlayerState.fromJSON(savedData);
      InputHandler.setup();
      CombatInputHandler.setup();
      Renderer.updateHud(PlayerState.getXp(), PlayerState.getLevel());
      App.nextQuestion();

      /* ----------------------------------------------------------
         Persistence triggers — save on tab hide and window close
         visibilitychange is more reliable than beforeunload on mobile
      ---------------------------------------------------------- */
      document.addEventListener('visibilitychange', () => {
        if (document.hidden) PersistenceStore.save(PlayerState);
      });
      window.addEventListener('beforeunload', () => {
        PersistenceStore.save(PlayerState);
      });

      /* ----------------------------------------------------------
         Debug helper — DevTools only; not visible in the UI.
         Usage: debugAccuracy() in the browser console to inspect
         per-table accuracy and mastery state for UAT.
      ---------------------------------------------------------- */
      window.debugAccuracy = () => {
        const tables = [...CONFIG.HARD_TABLES, ...CONFIG.EASY_TABLES];
        console.table(tables.map(t => ({
          table: t,
          accuracy: PlayerState.getAccuracy(t).toFixed(3),
          mastered: PlayerState.isMastered(t)
        })));
      };

    }); // end DOMContentLoaded
  </script>
</body>
</html>
