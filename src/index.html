<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>Nox Run — loading</title>
  <style>
    /*
      #stage is the canvas's parent: under Kaplay's `letterbox: true` (see
      main.js) the engine sizes the #game canvas to this wrapper's offset box
      and fits the internal 640x360 buffer into it — there is NO CSS transform
      on the canvas at all. The wrapper's size is chosen per device class so
      the display adapts without any app resize code:
        - pointer:fine (desktop/mouse) → fixed 960x540, so 640x360 letterboxes
          up exactly 1.5x into a 16:9 box with ZERO bars — the kid-validated
          desktop look is preserved geometry-for-geometry.
        - pointer:coarse (touch)       → a fill-width 16:9 box ANCHORED TO THE
          VISIBLE BOTTOM (see the coarse media block below for the full story);
          the canvas is responsive (Kaplay's onResize refits on rotate/resize
          automatically).
      The body still flex-centers #stage on both axes so the fixed desktop
      wrapper sits centered in the viewport.

      Gesture suppression + portrait overlay (MOB-04, plan 37-04):
        - #game has `touch-action: none` so the browser never claims the touch
          for pinch-zoom / scroll / double-tap-zoom — the game owns every touch
          over the canvas (the reliable suppressor per 37-RESEARCH.md; the
          viewport meta's user-scalable=no/maximum-scale=1 is honored
          inconsistently on iOS, so touch-action carries the guarantee).
        - #rotate is a dark-grunge "rotate your device" overlay, hidden by
          default. It is swapped in for #stage ONLY on a coarse-pointer device
          held in portrait, via the pure-CSS `@media (pointer: coarse) and
          (orientation: portrait)` query — NOT the JS lock API for screen
          orientation (unsupported/permission-gated on iOS Safari). Desktop (pointer:fine)
          never matches, so the overlay can never show there and the
          kid-validated desktop look is byte-unchanged.
    */
    html, body { margin: 0; background: #0a0a0a; height: 100%; }
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    canvas { display: block; }
    #game { touch-action: none; }  /* suppress pinch-zoom/scroll/double-tap-zoom over the canvas */
    @media (pointer: fine)   { #stage { width: 960px; height: 540px; } }

    /* Mobile framing — SCALE-TO-FIT / CONTAIN (quick 260721-ban; real-phone
       landscape play-test 2026-07-21). The prior quick-260720-mob approach sized
       #stage to a fill-width 16:9 box (`height: calc(100vw * 9 / 16)`) anchored to
       the visible bottom; in landscape that box is TALLER than the screen, so the
       sky overflowed above the fold — too much of the frame was lost.
       Fix: give #stage the full VISIBLE viewport height and let Kaplay's existing
       `letterbox: true` (main.js) CONTAIN the whole 640x360 buffer inside it. The
       full sky + ground + player + touch buttons all stay on-screen; thin PILLARBOX
       bars appear on the SIDES in landscape — the accepted trade-off. The single Qe
       mouse+touch transform is preserved (letterbox owns the mapping), so tap zones
       still register. Height uses `100dvh` (the DYNAMIC/visible viewport, which
       EXCLUDES the space under Chrome's dynamic toolbar) with a `100vh` fallback for
       pre-dvh engines — this is exactly what avoids the original `100vh` bug, where
       the LARGE viewport counted the space under the toolbar and hid the bottom.
       body is capped at the same 100dvh (100vh fallback) + overflow:hidden so nothing
       scrolls. Desktop (pointer:fine) above is byte-untouched. */
    @media (pointer: coarse) {
      body {
        height: 100vh;      /* fallback for engines without dvh */
        height: 100dvh;
        min-height: 0;      /* neutralize the base min-height:100vh (large viewport) */
        overflow: hidden;
      }
      #stage {
        position: fixed;
        left: 0;
        bottom: 0;
        width: 100vw;
        height: 100vh;      /* fallback for engines without dvh */
        height: 100dvh;     /* visible viewport → Kaplay letterbox CONTAINS 640×360, nothing cropped */
      }
    }

    /* Portrait "rotate your device" overlay — hidden by default; only ever
       shown on a coarse-pointer device in portrait (see media query below). */
    #rotate { display: none; }
    #rotate {
      position: fixed;
      inset: 0;
      background: #0a0a0a;
      color: #e8e8e8;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      font: 600 20px/1.5 system-ui, sans-serif;
      letter-spacing: 0.02em;
      z-index: 10;
    }
    #rotate .rotate-glyph {
      font-size: 3rem;
      margin-bottom: 1rem;
      color: #00ff88;  /* grunge accent, matches the file:// guard heading */
    }
    @media (pointer: coarse) and (orientation: portrait) {
      #rotate { display: flex; }
      #stage  { display: none; }
    }

    /* Touch controls overlay (quick 260721-cct) — the virtual thumb buttons live
       in an HTML overlay pinned to the PHYSICAL viewport, NOT inside the Kaplay
       640x360 buffer. That is the whole point of the rewrite: the letterbox/contain
       framing (quick 260721-ban) draws the game with pillarbox bars on the SIDES,
       so in-buffer buttons sat over the art and their fixed game-space px size could
       never reach the bars. Positioning against the real viewport edges + sizing in
       viewport units (vw/vh) puts the buttons at the physical screen corners / bar
       region and makes them naturally bigger and per-device responsive.
       Shown ONLY on a coarse-pointer device in landscape, and ONLY while the game
       scene has mounted them (.active, toggled by src/ui/touchControls.js). Desktop
       (pointer:fine) never matches the media query AND touchControls.js never adds
       .active on a fine pointer → the overlay is display:none and byte-inert there.
       Palette matches CONFIG.PALETTE (MUTED rgb(68,68,68), MUTED_BORDER rgb(112,112,112),
       TEXT rgb(232,232,232); resting opacity 0.35 / pressed 0.55). safe-area-inset-*
       keeps the buttons clear of notches/rounded corners (viewport meta sets
       viewport-fit=cover). */
    #touch-controls { display: none; }
    @media (pointer: coarse) and (orientation: landscape) {
      #touch-controls.active {
        display: block;                    /* override the base `display:none` so the overlay actually paints */
        position: fixed; inset: 0; z-index: 9500;
        pointer-events: none;              /* container is transparent to touches… */
      }
      #touch-controls.active .tc-btn {
        position: fixed;
        bottom: calc(env(safe-area-inset-bottom, 0px) + 3vh);
        display: flex; align-items: center; justify-content: center;
        box-sizing: border-box;
        width: min(15vw, 26vh); height: min(15vw, 26vh);
        border-radius: 50%;
        background: rgba(68, 68, 68, 0.35);
        border: 2px solid rgba(112, 112, 112, 0.6);
        color: rgb(232, 232, 232);
        font: 600 6vh/1 system-ui, sans-serif;
        padding: 0;
        -webkit-user-select: none; user-select: none;
        -webkit-tap-highlight-color: transparent;
        touch-action: none;                /* …the buttons own the touch (no scroll/zoom) */
        pointer-events: auto;
      }
      #touch-controls.active .tc-btn.pressed { background: rgba(68, 68, 68, 0.55); }
      /* movement cluster hugs the LEFT screen edge; jump hugs the RIGHT screen edge */
      #touch-controls.active #tc-left  { left: calc(env(safe-area-inset-left, 0px) + 2vw); }
      #touch-controls.active #tc-right { left: calc(env(safe-area-inset-left, 0px) + 2vw + min(15vw, 26vh) + 3vw); }
      #touch-controls.active #tc-jump  {
        right: calc(env(safe-area-inset-right, 0px) + 2vw); left: auto;
        width: min(18vw, 30vh); height: min(18vw, 30vh);
        font-size: 3.4vh;                  /* "JUMP" word fits the larger circle */
      }
    }
  </style>
  <!--
    file:// protocol guard — runs FIRST as a non-module inline script.
    A top-level static import in main.js is hoisted and would run before any
    in-module guard, so the guard must live here, before the module loads.
    If the page is opened as a local file, replace the body with a readable
    message and stop the module from loading (no silent blank canvas).
  -->
  <script>
    if (location.protocol === "file:") {
      document.documentElement.innerHTML =
        '<head><meta charset="utf-8"><title>Nox Run — run via a web server</title></head>' +
        '<body style="margin:0;background:#0a0a0a">' +
        '<div style="color:#e8e8e8;background:#0a0a0a;font:16px/1.6 system-ui,sans-serif;' +
        'padding:2rem;max-width:42rem;margin:auto">' +
        '<h1 style="color:#00ff88;margin-top:0">Run via a web server</h1>' +
        '<p>This page must be served over HTTP, not opened as a local file ' +
        '(<code>file://</code> blocks ES modules and asset loading).</p>' +
        '<p>For development, run <code style="color:#00ff88">python3 -m http.server 8000</code> ' +
        'in the project folder, then open ' +
        '<code style="color:#00ff88">http://localhost:8000/</code>.</p>' +
        '<p>Or just visit the hosted URL.</p>' +
        '</div></body>';
      // Belt-and-suspenders: prevent further loading (the module won't run
      // because we've replaced the document, but stop() is explicit).
      if (window.stop) window.stop();
    }
  </script>
</head>
<body>
  <div id="stage">
    <canvas id="game"></canvas>
  </div>
  <!-- Portrait rotate prompt (MOB-04). Static markup only — no user/localStorage
       value is ever interpolated here (T-37-03). Swapped in for #stage by the
       coarse-pointer+portrait media query above; never shown on desktop. -->
  <div id="rotate">
    <div class="rotate-glyph" aria-hidden="true">&#x21BB;</div>
    <div>Rotate your device to play</div>
  </div>
  <!-- Touch controls: an HTML overlay pinned to the PHYSICAL viewport (NOT the
       Kaplay canvas), so the thumb buttons base on the real screen edges / pillarbox
       bars rather than the letterboxed game frame. Shown only on a coarse-pointer
       device in landscape, and only while the game scene mounts them (.active,
       toggled by src/ui/touchControls.js). Desktop never renders it. -->
  <div id="touch-controls" aria-hidden="true">
    <button type="button" id="tc-left"  class="tc-btn" aria-label="Move left">&lt;</button>
    <button type="button" id="tc-right" class="tc-btn" aria-label="Move right">&gt;</button>
    <button type="button" id="tc-jump"  class="tc-btn tc-jump" aria-label="Jump">JUMP</button>
  </div>
  <!-- Relative src so src/ is the import base; resolves identically in dev and container. -->
  <script type="module" src="main.js"></script>
</body>
</html>
